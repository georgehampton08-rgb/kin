steps:
  # ── Build & push Docker image ─────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-and-push"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:initial"
      - "-t"
      - "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:latest"
      - "backend/"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-sha"
    args: ["push", "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:initial"]
    waitFor: ["build-and-push"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    args: ["push", "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:latest"]
    waitFor: ["build-and-push"]

  # ── Migrate via Cloud SQL Auth Proxy ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "migrate"
    entrypoint: bash
    args:
      - "-c"
      - |
        curl -sSo /workspace/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.9.0/cloud-sql-proxy.linux.amd64
        chmod +x /workspace/cloud-sql-proxy

        /workspace/cloud-sql-proxy \
          --unix-socket=/workspace/cloudsql \
          kin-tracker:us-central1:kin-db &
        PROXY_PID=$$!

        for i in $$(seq 1 30); do
          [ -S "/workspace/cloudsql/kin-tracker:us-central1:kin-db" ] && break
          sleep 1
        done

        pip install --quiet asyncpg alembic sqlalchemy geoalchemy2

        DB_URL=$$(gcloud secrets versions access latest --secret=kin-db-url)
        PROXY_URL=$$(echo "$$DB_URL" | sed 's|host=.*|host=/workspace/cloudsql/kin-tracker:us-central1:kin-db|')

        cd backend
        DATABASE_URL="$$PROXY_URL" alembic upgrade head

        kill $$PROXY_PID || true
    waitFor: ["push-sha", "push-latest"]

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy"
    args:
      - "run"
      - "deploy"
      - "kin-api"
      - "--image=us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:initial"
      - "--region=us-central1"
      - "--platform=managed"
      - "--min-instances=1"
      - "--max-instances=5"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--concurrency=80"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=kin-tracker:us-central1:kin-db"
      - "--set-secrets=DATABASE_URL=kin-db-url:latest,MQTT_PASSWORD=kin-mqtt-password:latest,JWT_SECRET=kin-jwt-secret:latest,ENCRYPTION_KEY=kin-encryption-key:latest"
      - "--set-env-vars=MQTT_BROKER=kin-broker,MQTT_PORT=1883,ENVIRONMENT=production,APP_VERSION=initial"
    waitFor: ["migrate"]

images:
  - "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:initial"
  - "us-central1-docker.pkg.dev/kin-tracker/kin/kin-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1200s"
